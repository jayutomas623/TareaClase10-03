
<div #loginCard class="card">

  <h2>Iniciar Sesión</h2>
  <div class="field">
    <span class="icon">
      <svg width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </span>
    <input
      type="text"
      placeholder="Usuario"
      [(ngModel)]="username"
      autocomplete="off"/>
  </div>

  <div class="field">
    <span class="icon">
      <svg width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </span>
    <input
      [type]="passwordVisible ? 'text' : 'password'"
      placeholder="Contraseña"
      [(ngModel)]="password"
      autocomplete="off"/>
    <span class="eye" (click)="togglePassword()">
      <svg *ngIf="!passwordVisible" width="15" height="15" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <svg *ngIf="passwordVisible" width="15" height="15" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8
                 a18.5 18.5 0 0 1-2.16 3.19"/>
        <path d="M6.53 6.53A10.07 10.07 0 0 0 1 12s4 8 11 8
                 a10 10 0 0 0 5.47-1.53"/>
      </svg>
    </span>
  </div>

  <button (click)="onLogin()">Ingresar</button>

</div>
